syntax = "proto3";

// 生成的 C++ 代码会被包裹在 rpc::core 这个 namespace 下
package rpc.core;

// RPC 消息头结构
message RpcHeader 
{
    string service_name = 1;                                    // 服务对象名。例如："game.rpc.LoginService"
    string method_name = 2;                                     // 具体的函数名。例如："Login"
    uint32 method_index = 3;                                    // 方法索引
    uint32 args_size = 4;                                       // 重点：紧跟在 Header 后面的参数 (比如 LoginRequest) 序列化后的字节长度！
}