syntax = "proto3";

package game.client;

// ================== 登录模块 ==================
message ClientLoginRequest 
{
    string username = 1;
    string password = 2;
}

message ClientLoginResponse
{
    int32 errcode = 1;                                                      // 0表示成功
    string errmsg = 2;
    int32 user_id = 3;                                                      // 成功后下发的 UID
}

// ================== 匹配模块 ==================
message ClientJoinMatchRequest 
{
    // 客户端发起匹配时，不需要传 UID 和网关地址，
    // 因为 Gateway 的 Context 里已经存了它的 UID 和物理连接！
}

message ClientJoinMatchResponse
{
    int32 errcode = 1;
    string errmsg = 2;
}

// ================== 服务端主动推送 ==================
message ClientMatchSuccessPush 
{
    string battle_server_ip = 1;
    int32 battle_server_port = 2;
    // ... 其他对局信息
}